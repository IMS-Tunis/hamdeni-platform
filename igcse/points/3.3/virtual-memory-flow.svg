     class="title"
     id="text3">How Paging Works with Virtual Memory</text>
  <text
     x="800"
     y="92"
     text-anchor="middle"
     class="subtitle"
     id="text4">RAM is full, so a least used program page is moved to secondary storage to make space for a new program.</text>
